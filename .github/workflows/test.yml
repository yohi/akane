name: test

on:
  push:
    branches:
      - master
      - 'feat/**'
  pull_request:
    branches:
      - master
      - 'feat/**'

jobs:
  bun-test:
    runs-on: ubuntu-slim
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.19"
          cache: "bun"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun test
